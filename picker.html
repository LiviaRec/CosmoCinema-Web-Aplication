<!DOCTYPE HTML>
<html lang="en-US">
<head>
	<meta charset="UTF-8">
	<title>CosmoCinema Picker</title>
	
    <link rel="icon" href="assets/images/kebabfavicon.png">
	<link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="stars-wrapper">
        <div class="stars"></div>
        <div class="stars"></div>
    </div>

    <nav class="navbar-left">
        <a href="index.html" class="logo-left">CosmoCinema</a>
        <ul>
            <li><a href="favourites.html">Favourites</a></li>
            <li><a href="lists.html">Lists</a></li>
        </ul>
    </nav>

    <section class="picker-page">
        <h1 class="picker-title">Choose your next adventure with our picker!</h1>
    </section>

    <div class="filters">
        <select id="genre-filter">
            <option value="any">Genre</option>
            <option value="action">Action</option>
            <option value="comedy">Comedy</option>
            <option value="horror">Horror</option>
            <option value="sci-fi">Sci-Fi</option>
            <option value="romance">Romance</option>
            <option value="animation">Animation</option>
        </select>

        <select id="mood-filter">
            <option value="any">Mood</option>
            <option value="lighthearted">Lighthearted</option>
            <option value="thought-provoking">Thought-Provoking</option>
            <option value="emotional">Emotional</option>
            <option value="funny">Funny</option> 
            <option value="sad">Sad</option>
        </select>

        <select id="duration-filter">
            <option value="any">Duration</option>
            <option value="short">Short (&lt; 90 min)</option>
            <option value="medium">Medium (90-120 min)</option>
            <option value="long">Long (&gt; 120 min)</option>
        </select>
    </div>

    <div class="picker-buttons">
        <button id="pick-btn">Pick a Movie</button>
        <button id="surprise-btn">Surprise me!</button>
    </div>

    <div class="movie-container hidden" id="movieContainer">
        <img id="moviePoster" src="" alt="Movie Poster" class="movie-poster">

        <div class="movie-info">
            <h2 id="movieTitle"></h2>
            <p id="movieDescription" class="movie-description"></p>
            <div class="movie-actions">
                <button class="add-favorite-btn" id="addFavoriteBtn" title="Add to Favourites">
                    <span class="heart-icon">&#10084;</span> 
                </button>
                <button class="add-list-btn" id="addListBtn" title="Add to List">
                    <span class="list-icon">&#9776;</span>
            </div>
                
        
    </div>

    <script src="picker.js"></script>
</body>
