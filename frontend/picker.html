<!DOCTYPE HTML>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CosmoCinema Picker</title>
    <link rel="icon" href="./css/CosmoCinemafavicon.gif">
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <div class="stars-wrapper">
        <div class="stars"></div>
        <div class="stars"></div>
    </div>

    <nav class="navbar-left">
        <a href="index.html" class="logo-left">CosmoCinema</a>
        <ul>
            <li><a href="favourites.html">Favourites</a></li>
            <li><a href="lists.html">Lists</a></li>
        </ul>
    </nav>

    <section class="picker-page">
        <h1 class="picker-title">Choose your next adventure with our picker!</h1>
    </section>

    <div class="filters">
        <select id="genre-select"><option value="">Genre</option></select>
        <select id="mood-select"><option value="">Mood</option></select>
        <select id="duration-select"><option value="">Duration</option></select>
    </div>

    <div class="picker-buttons">
        <button class="btn-primary" onclick="pickMovie(false)">Pick a movie</button>
        <button class="btn-primary" onclick="pickMovie(true)">Surprise me!</button>
    </div>

    <div class="loading" id="picker-loading" style="display:none">Finding your movie...</div>

    <div class="picker-result" id="picker-result">
        <div class="picker-poster-col">
            <img class="picker-poster" id="picker-poster" src="" alt="Movie Poster">
            <!-- browse navigation-->
            <div class="browse-nav" id="browse-nav" style="display:none">
                <button class="browse-btn" id="browse-prev" onclick="browsePrev()" title="Previous movie">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
                </button>
                <div class="browse-info">
                    <span class="browse-counter" id="browse-counter"></span>
                    <span class="browse-rating"  id="browse-rating"></span>
                </div>
                <button class="browse-btn" id="browse-next" onclick="browseNext()" title="Next movie">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg>
                </button>
            </div>
        </div>
        <div class="picker-movie-info">
            <h2 class="picker-movie-title" id="picker-title"></h2>
            <p class="picker-movie-desc" id="picker-desc"></p>
            <div class="picker-actions">
                <button class="icon-btn heart" id="picker-heart" onclick="toggleHeart()" title="Save to Favourites">
                    <svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
                </button>
                <button class="icon-btn bookmark" id="picker-bookmark" onclick="toggleBookmark()" title="Save to list">
                    <svg viewBox="0 0 24 24"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
                </button>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script src="js/modal.js"></script>
    <script src="js/picker.js"></script>
</body>
</html>
