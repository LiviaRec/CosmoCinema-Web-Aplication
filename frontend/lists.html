<!DOCTYPE HTML>
<html lang="en-US">
<head>
	<meta charset="UTF-8">
	<title>CosmoCinema Lists</title>
	
    <link rel="icon" href="./css/CosmoCinemafavicon.gif">
	<link rel="stylesheet" href="./css/style.css" />
</head>
<body>
    <div class="stars-wrapper">
        <div class="stars"></div>
        <div class="stars"></div>
    </div>

    <nav class="navbar-left">
        <a href="index.html" class="logo-left">CosmoCinema</a>
        <ul>
            <li><a href="picker.html">Picker</a></li>
            <li><a href="favourites.html">Favourites</a></li>
        </ul>
    </nav>

     <div class="lists-toolbar">
        <button class="btn-create-list" onclick="openCreateList()">+ New List</button>
    </div>
 
    <main>
        <div id="lists-container">
            <div class="loading">Loading...</div>
        </div>
    </main>
 
    <div class="modal-overlay" id="create-list-modal">
        <div class="modal">
            <button class="modal-close" onclick="closeCreateList()">✕</button>
            <h2>New List</h2>
            <input type="text" id="new-list-name" placeholder="List name" maxlength="50">
            <textarea id="new-list-desc" placeholder="Description (optional)" rows="3"></textarea>
            <button class="btn-auth" onclick="submitCreateList()">Create List</button>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script src="js/modal.js"></script>
    <script src="js/lists.js"></script>
</body>
</html>
