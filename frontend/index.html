<!DOCTYPE HTML>
<html lang="en-US">
<head>
	<meta charset="UTF-8">
	<title>CosmoCinema</title>
	
    <link rel="icon" href="./css/CosmoCinemafavicon.gif">
	<link rel="stylesheet" href="./css/style.css" />
</head>
<body>

    <div class="stars-wrapper">
        <div class="stars"></div>
        <div class="stars"></div>
    </div>

    <nav class="navbar">
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="picker.html">Picker</a></li>
            <li><a href="favourites.html">Favourites</a></li>
            <li><a href="lists.html">Lists</a></li>
            <a id="nav-signin" href="#" onclick="handleSignInClick(event)">Sign In</a>
        </ul>
    </nav>

    <section class="hero">
        <h1>CosmoCinema</h1>
        <p>Explore the universe of movies</p>
        <button class="btn-get-started" onclick="window.location.href='picker.html'">Get Started</button>
    </section>

    <script src="js/app.js"></script>
    <script src="js/modal.js"></script>
    <script>
    function handleSignInClick(e) {
        e.preventDefault();

        if (auth.isLoggedIn()) {
            auth.clearSession();
            updateNavAvatar();
            document.getElementById('nav-signin').textContent = 'Sign In';
            showToast('Signed out');
        } 
        else {
        openModal('signin');
        }
    }

    document.addEventListener('DOMContentLoaded', () => {
        const signinLink = document.getElementById('nav-signin');
        if (auth.isLoggedIn()) {
            signinLink.textContent = auth.user.username;
        }
    });
    </script>

</body>
</html>
